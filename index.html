<style>

<script>
(function(){
"use strict";

var FIREBASE_CONFIG = {

};

var DIET_TYPES = [
  {id:'nessuna', name:'Nessuna dieta', icon:'-', desc:'Nessuna restrizione alimentare', color:'#e0e0e0'},
  {id:'normale', name:'Normale', icon:'\u2714', desc:'Dieta standard', color:'#4caf50'},
  {id:'senza-glutine', name:'Senza glutine', icon:'\ud83c\udf3e', desc:'Intolleranza al glutine / Celiachia', color:'#ff9800'},
  {id:'senza-lattosio', name:'Senza lattosio', icon:'\ud83e\udd5b', desc:'Intolleranza al lattosio', color:'#2196f3'},
  {id:'vegetariana', name:'Vegetariana', icon:'\ud83e\udd6c', desc:'Dieta vegetariana', color:'#9c27b0'},

  {id:'senza-pesce', name:'Senza pesce', icon:'\u274c', desc:'Allergia al pesce', color:'#009688'},
  {id:'personalizzata', name:'Personalizzata', icon:'\u270f', desc:'Dieta personalizzata', color:'#9c27b0'}
];

var children = [
  'Sofia Rossi','Leonardo Bianchi','Aurora Romano','Tommaso Ferrari',
  'Giulia Esposito','Mattia Ricci','Alice Marino','Nicola Parisi',
  'Elisa Benedetti','Simone Rinaldi','Beatrice Costa','Davide Moretti',
  'Martina Barbieri','Federico Rizzo','Chiara Lombardi','Gabriele Gallo',
  'Ginevra Conti','Alessandro De Luca','Lorenzo Greco','Emma Bruno',
  'Pietro Colombo','Viola Fontana','Marco Villa','Camilla Russo',
  'Edoardo Messina','Anna Serra','Filippo Mazza','Bianca Pellegrini',
  'Luca Marchetti','Giorgia Ferretti'
];

var presenze = {};
var pre = {};
var post = {};
var childDiets = {};
var childGender = {};
var childDeleghe = {};
var childContatti = {};
var childLastModified = {};
var childAge = {};
var childNotes = {};
var currentDate = new Date();
var search = '';
var sortMode = 'default';
var className = 'Chioccioline';
var schoolName = 'Scuola dell\'Infanzia di Bonirola';
var teacher1 = '';
var teacher2 = '';
var editingSchool = false;
var editingTeacher1 = false;
var editingTeacher2 = false;
var editingClass = false;
var editingChild = -1;
var editValue = '';
var currentUser = null;
var loginLoading = false;
var db = null;
var syncStatus = 'idle';
var firestoreLoaded = false;
var firestoreLoadDone = false;
var showDietModal = -1;
var selectedChild = -1;

var dateData = {};
var holidays = {};
var dayNotes = {};
var classes = {};
var currentClassId = '';
var unlockedClasses = {};
var classLocked = false;
var COORDINATRICE_ID = '__coordinatrice__';


function regularClassCount(){var c=0;for(var k in classes){if(classes.hasOwnProperty(k)&&k!==COORDINATRICE_ID)c++;}return c;}
function totalClassCount(){return Object.keys(classes).length;}
function isCoordinatrice(){return currentClassId===COORDINATRICE_ID;}

var DAYS = ['Domenica','Luned\u00ec','Marted\u00ec','Mercoled\u00ec','Gioved\u00ec','Venerd\u00ec','Sabato'];
var MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var MONTHS_SHORT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

function dateToKey(dt){
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function dateToShort(dt){
  return dt.getDate()+' '+MONTHS_SHORT[dt.getMonth()]+' '+dt.getFullYear();
}
function dateToFull(dt){
  return DAYS[dt.getDay()]+' '+dt.getDate()+' '+MONTHS[dt.getMonth()]+' '+dt.getFullYear();
}
function dateToInput(dt){
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function getInitials(name){
  var parts=name.trim().split(/\s+/);
  if(parts.length>=2) return parts[0][0].toUpperCase()+parts[parts.length-1][0].toUpperCase();
  return parts[0].substring(0,2).toUpperCase();
}
function nameReversed(name){
  var parts=name.trim().split(/\s+/);
  if(parts.length>=2) return parts[parts.length-1]+' '+parts[0];
  return name;
}
function countKeys(obj){var c=0;for(var k in obj)if(obj.hasOwnProperty(k))c++;return c;}
function hasKey(obj,k){return obj.hasOwnProperty(k);}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function ensureCoordinatrice(){
  if(!classes[COORDINATRICE_ID]){
    classes[COORDINATRICE_ID]={
      id:COORDINATRICE_ID,name:'COORDINATRICE',pin:'',isCoordinatrice:true,
      children:[],childDiets:{},childGender:{},childDeleghe:{},childContatti:{},
      childLastModified:{},childAge:{},childNotes:{},
      dateData:{},holidays:{},dayNotes:{},
      teacher1:'',teacher2:'',sortMode:'default'
    };
  }
}

function rebuildCoordinatriceChildren(){
  var c=classes[COORDINATRICE_ID];
  if(!c) return;
  var newChildren=[];
  var newSourceMap={};
  var classKeys=Object.keys(classes);
  var CLASS_COLORS=['#5b9bd5','#28a745','#e67e00','#9c27b0','#dc3545','#17a2b8','#6c757d','#1a1a2e'];
  var colorIdx=0;
  for(var i=0;i<classKeys.length;i++){
    var cId=classKeys[i];
    if(cId===COORDINATRICE_ID) continue;
    var src=classes[cId];
    if(!src||!src.children) continue;
    var srcColor=CLASS_COLORS[colorIdx%CLASS_COLORS.length];colorIdx++;
    for(var j=0;j<src.children.length;j++){
      var idx=newChildren.length;
      newChildren.push(src.children[j]);
      newSourceMap[idx]={classId:cId,className:src.name||'Classe',sourceIndex:j,color:srcColor};
    }
  }
  c.children=newChildren;
  c.childSourceMap=newSourceMap;
  // Carica nelle variabili globali
  children=newChildren.slice();
  for(var li=0;li<children.length;li++){children[li]=children[li].toUpperCase();}
  childDiets={};childGender={};childDeleghe={};childContatti={};childLastModified={};childAge={};childNotes={};
  // Copia dati bambino dalle classi sorgente
  for(var k=0;k<newChildren.length;k++){
    var s=newSourceMap[k];if(!s) continue;
    var sc=classes[s.classId];if(!sc) continue;
    if(sc.childDiets&&sc.childDiets[s.sourceIndex]) childDiets[k]=sc.childDiets[s.sourceIndex];
    if(sc.childGender&&sc.childGender[s.sourceIndex]) childGender[k]=sc.childGender[s.sourceIndex];
    if(sc.childDeleghe&&sc.childDeleghe[s.sourceIndex]) childDeleghe[k]=sc.childDeleghe[s.sourceIndex];
    if(sc.childContatti&&sc.childContatti[s.sourceIndex]) childContatti[k]=sc.childContatti[s.sourceIndex];
    if(sc.childAge&&sc.childAge[s.sourceIndex]) childAge[k]=sc.childAge[s.sourceIndex];
    if(sc.childNotes&&sc.childNotes[s.sourceIndex]) childNotes[k]=sc.childNotes[s.sourceIndex];
  }
  // Unisci dateData da tutte le classi: mappa indici sorgente -> indici COORDINATRICE
  var mergedDateData={};
  // Prima copia il dateData della COORDINATRICE stessa (se esiste)
  if(c.dateData){
    for(var dk in c.dateData){
      if(c.dateData.hasOwnProperty(dk)) mergedDateData[dk]=JSON.parse(JSON.stringify(c.dateData[dk]));
    }
  }
  // Poi sovrascrivi con i dateData delle singole classi (mappando gli indici)
  for(var k3=0;k3<newChildren.length;k3++){
    var s3=newSourceMap[k3];if(!s3) continue;
    var sc3=classes[s3.classId];if(!sc3||!sc3.dateData) continue;
    for(var dk2 in sc3.dateData){
      if(!sc3.dateData.hasOwnProperty(dk2)) continue;
      if(!mergedDateData[dk2]) mergedDateData[dk2]={presenze:{},pre:{},post:{}};
      var srcDD=sc3.dateData[dk2];
      var srcIdx=s3.sourceIndex;
      if(srcDD.presenze&&srcDD.presenze[srcIdx]) mergedDateData[dk2].presenze[k3]=true;
      if(srcDD.pre&&srcDD.pre[srcIdx]) mergedDateData[dk2].pre[k3]=true;
      if(srcDD.post&&srcDD.post[srcIdx]) mergedDateData[dk2].post[k3]=true;
    }
  }
  dateData=mergedDateData;
  c.dateData=mergedDateData;
  holidays={};dayNotes={};
  className='COORDINATRICE';teacher1=c.teacher1||'';teacher2='';sortMode='default';
  var key=getCurrentDateKey();var dd=dateData[key];
  if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}
  else{presenze={};pre={};post={};}
}

function getDietType(typeId){
  for(var i=0;i<DIET_TYPES.length;i++){
    if(DIET_TYPES[i].id===typeId) return DIET_TYPES[i];
  }
  return DIET_TYPES[0];
}
function getDietLabel(idx){
  if(!childDiets[idx]||childDiets[idx].type==='nessuna') return '';
  return getDietType(childDiets[idx].type).name;
}
function getDietTagClass(typeId){
  if(!typeId||typeId==='nessuna') return 'default';
  return typeId;
}

function guessGender(name){
  var firstName=name.trim().split(/\s+/)[0].toLowerCase();
  var maleNames=['leonardo','tommaso','mattia','nicola','simone','davide','federico','gabriele','alessandro','lorenzo','pietro','marco','edoardo','filippo','luca'];
  var femaleNames=['sofia','aurora','giulia','alice','elisa','beatrice','martina','chiara','ginevra','emma','viola','camilla','anna','bianca','giorgia'];
  for(var i=0;i<maleNames.length;i++){if(firstName===maleNames[i]) return 'm';}
  for(var j=0;j<femaleNames.length;j++){if(firstName===femaleNames[j]) return 'f';}
  if(firstName.endsWith('a')||firstName.endsWith('e')) return 'f';
  if(firstName.endsWith('o')||firstName.endsWith('i')) return 'm';
  return 'm';
}
function getGender(idx){
  if(childGender[idx]) return childGender[idx];
  return guessGender(children[idx]);
}
function getGenderClass(idx){var g=getGender(idx);return g==='f'?'female':'male';}

function getCurrentDateKey(){ return dateToKey(currentDate); }
function isWeekend(){ var d=currentDate.getDay(); return d===0||d===6; }
function isHoliday(){ var key=getCurrentDateKey(); return !!holidays[key]; }
function isDayOff(){ return isWeekend()||isHoliday(); }

function saveCurrentDateData(){
  var key=getCurrentDateKey();
  dateData[key]={presenze:JSON.parse(JSON.stringify(presenze)),pre:JSON.parse(JSON.stringify(pre)),post:JSON.parse(JSON.stringify(post))};
}

function switchToDate(dt){
  saveCurrentDateData();
  currentDate=new Date(dt);
  var key=getCurrentDateKey();
  var dd=dateData[key];
  if(dd){presenze=JSON.parse(JSON.stringify(dd.presenze||{}));pre=JSON.parse(JSON.stringify(dd.pre||{}));post=JSON.parse(JSON.stringify(dd.post||{}));}
  else{presenze={};pre={};post={};}
}

function generateClassId(){
  return 'class_'+Date.now()+'_'+Math.random().toString(36).substring(2,7);
}

function saveCurrentClassData(){
  saveCurrentDateData();
  if(!currentClassId) return;
  if(!classes[currentClassId]) classes[currentClassId]={};
  classes[currentClassId].id=currentClassId;
  // COORDINATRICE: salva solo dateData (presenze), non i bambini (vengono dalle classi)
  if(currentClassId===COORDINATRICE_ID){
    classes[currentClassId].name='COORDINATRICE';
    classes[currentClassId].isCoordinatrice=true;
    classes[currentClassId].pin=classes[currentClassId].pin||'';
    classes[currentClassId].teacher1=teacher1;
    classes[currentClassId].teacher2='';
    // Propaga presenze/pre/post alle classi sorgente
    if(classes[COORDINATRICE_ID]&&classes[COORDINATRICE_ID].childSourceMap){
      var srcMap=classes[COORDINATRICE_ID].childSourceMap;
      for(var dk in dateData){
        if(!dateData.hasOwnProperty(dk)) continue;
        var dd=dateData[dk];
        for(var ci=0;ci<children.length;ci++){
          var s=srcMap[ci];if(!s) continue;
          var sc=classes[s.classId];if(!sc) continue;
          if(!sc.dateData) sc.dateData={};
          if(!sc.dateData[dk]) sc.dateData[dk]={presenze:{},pre:{},post:{}};
          var srcIdx=s.sourceIndex;
          if(dd.presenze&&dd.presenze[ci]) sc.dateData[dk].presenze[srcIdx]=true;
          else if(sc.dateData[dk].presenze) delete sc.dateData[dk].presenze[srcIdx];
          if(dd.pre&&dd.pre[ci]) sc.dateData[dk].pre[srcIdx]=true;
          else if(sc.dateData[dk].pre) delete sc.dateData[dk].pre[srcIdx];
          if(dd.post&&dd.post[ci]) sc.dateData[dk].post[srcIdx]=true;
          else if(sc.dateData[dk].post) delete sc.dateData[dk].post[srcIdx];
        }
      }
    }
    // Non salvare dateData nella COORDINATRICE (viene ricostruito dalle classi)
    classes[currentClassId].dateData={};
    return;
  }
  // Sync: usa sempre il nome salvato nella classe se diverso da className globale
  if(classes[currentClassId].name&&classes[currentClassId].name!==className){

function loadClassData(classId){

  // COORDINATRICE: ricostruisci bambini da tutte le classi
  if(classId===COORDINATRICE_ID){rebuildCoordinatriceChildren();return;}
  var c=classes[classId];
  children=c.children||[];
  for(var li=0;li<children.length;li++){children[li]=children[li].toUpperCase();}
  childDiets=c.childDiets||{};
  childGender=c.childGender||{};
  childDeleghe=c.childDeleghe||{};

  childLastModified=c.childLastModified||{};
  childAge=c.childAge||{};
  childNotes=c.childNotes||{};
  dateData=c.dateData||{};
  holidays=c.holidays||{};
  dayNotes=c.dayNotes||{};
  className=c.name||'Classe';

  teacher2=c.teacher2||'';

  }

    var rkeys=Object.keys(classes).filter(function(k){return k!==COORDINATRICE_ID;});

  updateClassLockState();
}

function updateClassLockState(){
  if(!currentClassId||!classes[currentClassId]){classLocked=false;return;}
  var pin=classes[currentClassId].pin||'';
  classLocked=pin&&pin.length>0&&!unlockedClasses[currentClassId];
}

function tryUnlockClass(classId){
  if(!classes[classId]) return false;
  var pin=classes[classId].pin||'';
  if(!pin){unlockedClasses[classId]=true;return true;}
  if(unlockedClasses[classId]) return true;
  var entered=prompt('Inserisci il PIN per accedere alla classe "'+(classes[classId].name||'Classe')+'":');
  if(entered===null) return false;
  if(entered===pin){unlockedClasses[classId]=true;return true;}
  alert('PIN errato!');
  return false;
}

var firestoreSaveTimer=null;
function saveToFirestore(){
  if(!currentUser||!db) return;
  if(firestoreSaveTimer) clearTimeout(firestoreSaveTimer);
  syncStatus='saving';renderSyncBar();
  firestoreSaveTimer=setTimeout(function(){doSaveToFirestore();},1000);
}
function saveToFirestoreNow(){
  if(!currentUser||!db) return;
  if(firestoreSaveTimer){clearTimeout(firestoreSaveTimer);firestoreSaveTimer=null;}
  syncStatus='saving';renderSyncBar();
  doSaveToFirestore();
}
function doSaveToFirestore(){
  if(!currentUser||!db) return;
  saveCurrentClassData();
  // Always save to localStorage first (synchronous, immediate backup)
  try{localStorage.setItem(getStorageKey(),JSON.stringify({classes:JSON.parse(JSON.stringify(classes)),currentClassId:currentClassId,schoolName:schoolName,currentDate:dateToInput(currentDate)}));}catch(e){}
  var data={classes:JSON.parse(JSON.stringify(classes)),currentClassId:currentClassId,schoolName:schoolName,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  var classCount=Object.keys(classes).length;
  console.log('[SAVE] Saving to Firestore: '+classCount+' classes, currentClassId='+currentClassId);
  for(var cid in classes){if(classes.hasOwnProperty(cid)){console.log('[SAVE] Class: '+cid+' = '+(classes[cid].name||'?')+' (pin='+(classes[cid].pin?'SET':'none')+', children='+(classes[cid].children?classes[cid].children.length:0)+')');}}
  db.collection('users').doc(currentUser.uid).set(data)
    .then(function(){

    })
    .catch(function(err){

      syncStatus='error';renderSyncBar();
      alert('Errore di salvataggio nel cloud!\nI dati sono salvati localmente.\nErrore: '+err.message+'\n\nClasse count: '+classCount);

function restorePinsFromLocalStorage(){

  try{

    for(var classId in savedPins){
      if(savedPins.hasOwnProperty(classId)&&classes[classId]){

        if(savedPins[classId]&&savedPins[classId].length>0){

    }
  }catch(e){console.error('restorePins error:',e);}

function savePinsToLocalStorage(){

  try{
    var pins={};

      if(classes.hasOwnProperty(classId)&&classes[classId].pin&&classes[classId].pin.length>0){

      }

function loadFromFirestore(uid){
  if(!db) return;
  // Prevent double-loading: if already loaded for this user, skip
  if(firestoreLoadDone&&currentUser&&currentUser.uid===uid) return;
  
  // STEP 1: Load from localStorage FIRST as immediate backup
  // This prevents data loss if Firestore cache returns stale data
  var localData=null;
  try{
    var ld=JSON.parse(localStorage.getItem('rp_data_'+uid));
    if(ld&&ld.classes) localData=ld;
  }catch(e){}
  
  resetAllData();
  syncStatus='saving';renderSyncBar();
  
  // STEP 2: Try to get data - prefer server data but fallback gracefully
  db.collection('users').doc(uid).get()
    .then(function(doc){
      handleFirestoreData(doc, uid, localData);
    })
    .catch(function(err){
      console.error('Firestore fetch failed:', err);
      // Fallback: use localStorage data
      if(localData){
        classes=localData.classes;
        currentClassId=localData.currentClassId||'';
        if(localData.schoolName) schoolName=localData.schoolName;
        if(localData.currentDate){try{currentDate=new Date(localData.currentDate+'T12:00:00');}catch(e3){}}
        restorePinsFromLocalStorage();
        if(currentClassId&&classes[currentClassId]){loadClassData(currentClassId);}
        ensureDefaultClass();
        restorePinsFromLocalStorage();
      }else{
        ensureDefaultClass();
      }
      firestoreLoadDone=true;firestoreLoaded=true;syncStatus='error';
      updateClassLockState();render();
    });
}

function handleFirestoreData(doc, uid, localData){
  var useFirestoreData=false;
  if(doc.exists){
    var d=doc.data();
    if(d.classes){
      // Compare: use Firestore data if it has more classes or newer timestamp
      var fsClassCount=Object.keys(d.classes).length;
      var localClassCount=localData?Object.keys(localData.classes).length:0;
      console.log('[LOAD] Firestore classes: '+fsClassCount+', localStorage classes: '+localClassCount);
      // Log what Firestore has
      for(var fcid in d.classes){if(d.classes.hasOwnProperty(fcid)){console.log('[LOAD] FS class: '+fcid+' = '+(d.classes[fcid].name||'?'));}}
      if(localData){for(var lcid in localData.classes){if(localData.classes.hasOwnProperty(lcid)){console.log('[LOAD] LS class: '+lcid+' = '+(localData.classes[lcid].name||'?'));}}}
      // If Firestore has same or more classes, use Firestore
      // If localStorage has MORE classes, localStorage is more recent (user just added one)
      if(localClassCount>fsClassCount){
        console.log('localStorage has more classes ('+localClassCount+') than Firestore ('+fsClassCount+'), using localStorage');
        classes=localData.classes;
        currentClassId=localData.currentClassId||'';
        if(localData.schoolName) schoolName=localData.schoolName;
        if(localData.currentDate){try{currentDate=new Date(localData.currentDate+'T12:00:00');}catch(e){}}
      }else{
        classes=d.classes;
        currentClassId=d.currentClassId||'';
        if(d.schoolName) schoolName=d.schoolName;
      }
      useFirestoreData=true;
    }else{
      // OLD FORMAT - migrate
      if(d.children&&d.children.length>0){children=d.children;for(var ui=0;ui<children.length;ui++){children[ui]=children[ui].toUpperCase();}}
      if(d.className) className=d.className;
      if(d.schoolName) schoolName=d.schoolName;
      if(d.teacher1!==undefined) teacher1=d.teacher1;
      if(d.teacher2!==undefined) teacher2=d.teacher2;
      if(d.holidays) holidays=d.holidays;
      if(d.dayNotes) dayNotes=d.dayNotes;
      if(d.dateData) dateData=d.dateData;
      if(d.childDiets) childDiets=d.childDiets;
      if(d.childGender) childGender=d.childGender;
      if(d.childDeleghe) childDeleghe=d.childDeleghe;
      if(d.childContatti) childContatti=d.childContatti;
      if(d.childLastModified) childLastModified=d.childLastModified;
      if(d.childAge) childAge=d.childAge;
      if(d.childNotes) childNotes=d.childNotes;
      if(d.sortMode) sortMode=d.sortMode;
      ensureDefaultClass();
    }
  }else{
    // No Firestore doc yet — use localStorage as primary source
    if(localData){
      classes=localData.classes;
      currentClassId=localData.currentClassId||'';
      if(localData.schoolName) schoolName=localData.schoolName;
      if(localData.currentDate){try{currentDate=new Date(localData.currentDate+'T12:00:00');}catch(e){}}
    }else{
      loadState();
    }
    ensureDefaultClass();
    updateClassLockState();
    firestoreLoadDone=true;firestoreLoaded=true;syncStatus='synced';updateClassLockState();render();
    setTimeout(function(){if(syncStatus==='synced'){syncStatus='idle';renderSyncBar();}},3000);
    return;
  }
  
  if(useFirestoreData){
    restorePinsFromLocalStorage();
    if(currentClassId&&classes[currentClassId]){loadClassData(currentClassId);}
    ensureDefaultClass();
    restorePinsFromLocalStorage();
  }
  
  var key=getCurrentDateKey();var dd=dateData[key];
  if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}
  else{presenze={};pre={};post={};}
  // Non sbloccare automaticamente le classi con PIN - l'utente deve inserirlo
  // Se la classe non ha PIN, sbloccala automaticamente
  if(currentClassId&&classes[currentClassId]&&!(classes[currentClassId].pin&&classes[currentClassId].pin.length>0)){unlockedClasses[currentClassId]=true;}
  // Always update localStorage with latest data
  try{localStorage.setItem(getStorageKey(),JSON.stringify({classes:JSON.parse(JSON.stringify(classes)),currentClassId:currentClassId,schoolName:schoolName,currentDate:dateToInput(currentDate)}));}catch(e){}
  savePinsToLocalStorage();
  
  firestoreLoadDone=true;
  firestoreLoaded=true;syncStatus='synced';updateClassLockState();render();
  setTimeout(function(){if(syncStatus==='synced'){syncStatus='idle';renderSyncBar();}},3000);
}

function initFirebase(){
  try{
    if(typeof firebase==='undefined'){console.warn('Firebase SDK not loaded');render();return;}
    firebase.initializeApp(FIREBASE_CONFIG);
    var auth=firebase.auth();
    db=firebase.firestore();
    // Disable Firestore offline persistence to prevent stale cache issues
    // localStorage is our primary backup - Firestore is the cloud sync
    try{db.enablePersistence({synchronizeTabs:false}).then(function(){console.log('Firestore persistence enabled (no multi-tab sync)');}).catch(function(e){console.log('Firestore persistence note:',e.code||e.message||e);});}catch(e){console.log('Firestore persistence:',e.message||e);}
    try{auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);}catch(e){}
    auth.onAuthStateChanged(function(u){
      var previousUser=currentUser;
      currentUser=u;loginLoading=false;
      if(u){
        if(previousUser&&previousUser.uid!==u.uid){
          resetAllData();
          firestoreLoadDone=false;
        }
        loadFromFirestore(u.uid);
      }else{
        firestoreLoadDone=false;
        try{localStorage.removeItem('rp_data');}catch(e){}
        try{if(previousUser){localStorage.removeItem('rp_data_'+previousUser.uid);}}catch(e2){}
        resetAllData();
        syncStatus='idle';render();
      }
    });
    try{auth.getRedirectResult();}catch(e){}
  }catch(e){console.error('Firebase init error:',e);render();}
}

function handleLogin(){
  if(typeof firebase==='undefined'){alert('Firebase non caricato. Ricarica la pagina.');return;}
  var auth=firebase.auth();
  if(currentUser){
    if(confirm('Vuoi disconnettere l\'account "'+(currentUser.displayName||currentUser.email)+'"?\n\nI dati rimarranno salvati nel tuo account Google.')){
      var uid=currentUser.uid;
      saveCurrentClassData();
      // Salva su Firestore senza aspettare (fire and forget)
      try{
        if(db&&uid){
          var data={classes:JSON.parse(JSON.stringify(classes)),currentClassId:currentClassId,schoolName:schoolName,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
          db.collection('users').doc(uid).set(data).catch(function(){});
        }
      }catch(e){}
      // Pulisci localStorage
      try{localStorage.removeItem('rp_data_'+uid);}catch(e){}
      try{localStorage.removeItem('rp_data');}catch(e){}
      // Effettua il logout Firebase subito, senza aspettare nulla
      try{auth.signOut();}catch(e){}
      // Forza ricaricamento pagina dopo mezzo secondo
      setTimeout(function(){window.location.reload();},500);
    }
  }else{
    loginLoading=true;render();
    var provider=new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function(error){
      loginLoading=false;render();var msg='Errore durante il login.';
      if(error.code==='auth/popup-closed-by-user') return;
      else if(error.code==='auth/popup-blocked'){auth.signInWithRedirect(provider);return;}
      else if(error.code==='auth/unauthorized-domain'){msg='Dominio "'+window.location.hostname+'" non autorizzato.\n\nVai su Firebase Console > Authentication > Settings > Authorized domains e aggiungi:\n'+window.location.hostname;}
      else if(error.code==='auth/operation-not-allowed'){msg='Login Google non abilitato. Abilitalo in Firebase Console.';}
      else{msg='Errore: '+error.message;}
      alert(msg);
    });
  }
}

function getFilteredChildren(){
  var result=[];for(var i=0;i<children.length;i++){if(!search||children[i].toLowerCase().indexOf(search.toLowerCase())>=0){result.push({name:children[i],i:i});}}
  if(sortMode==='alpha'){
    result.sort(function(a,b){return nameReversed(a.name).toLowerCase().localeCompare(nameReversed(b.name).toLowerCase());});
  }else if(sortMode==='gender'){
    result.sort(function(a,b){var ga=getGender(a.i),gb=getGender(b.i);if(ga!==gb) return ga==='f'?-1:1;return nameReversed(a.name).toLowerCase().localeCompare(nameReversed(b.name).toLowerCase());});
  }else if(sortMode==='recent'){
    result.sort(function(a,b){var ta=childLastModified[a.i]||0,tb=childLastModified[b.i]||0;return tb-ta;});
  }else if(sortMode==='age-asc'){
    result.sort(function(a,b){var aa=parseFloat(childAge[a.i])||0,bb=parseFloat(childAge[b.i])||0;return aa-bb;});
  }else if(sortMode==='age-desc'){
    result.sort(function(a,b){var aa=parseFloat(childAge[a.i])||0,bb=parseFloat(childAge[b.i])||0;return bb-aa;});
  }
  return result;
}

function getChildMonthlyStats(idx){
  saveCurrentDateData();
  var cm=currentDate.getMonth();
  var cy=currentDate.getFullYear();
  var daysInMonth=new Date(cy,cm+1,0).getDate();
  var currentDay=currentDate.getDate();
  var mP=0,mPre=0,mPost=0;
  var dayList=[];
  for(var d=1;d<=Math.min(daysInMonth,currentDay);d++){
    var dKey=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dd=dateData[dKey];
    var pFlag=false,preFlag=false,postFlag=false;
    if(dd){
      if(dd.presenze&&dd.presenze[idx]) pFlag=true;
      if(dd.pre&&dd.pre[idx]) preFlag=true;
      if(dd.post&&dd.post[idx]) postFlag=true;
    }
    if(pFlag) mP++;
    if(preFlag) mPre++;
    if(postFlag) mPost++;
    if(pFlag||preFlag||postFlag){
      dayList.push({day:d,key:dKey,p:pFlag,pre:preFlag,post:postFlag});
    }
  }
  return {presenze:mP,pre:mPre,post:mPost,days:dayList,totalDays:Math.min(daysInMonth,currentDay)};
}

  removeChild:function(i){
    if(!confirm('Rimuovere '+children[i]+' dalla lista?\n\nI dati di presenze, deleghe, contatti e note verranno persi.')) return;
    var len=children.length;
    children.splice(i,1);
    // Shift all index-based data down
    var keys=['childDiets','childGender','childDeleghe','childContatti','childLastModified','childAge','childNotes'];
    for(var ki=0;ki<keys.length;ki++){
      var obj=window[keys[ki]];
      if(!obj) continue;
      // Build new object with shifted indices
      var newObj={};
      for(var k in obj){
        if(!obj.hasOwnProperty(k)) continue;
        var idx=parseInt(k);
        if(idx===i) continue; // skip removed
        if(idx>i) newObj[idx-1]=obj[k];
        else newObj[idx]=obj[k];
      }
      window[keys[ki]]=newObj;
    }
    // Fix presenze/pre/post for current date
    var dateKeys=['presenze','pre','post'];
    for(var di=0;di<dateKeys.length;di++){
      var dObj=window[dateKeys[di]];
      if(!dObj) continue;
      var newDObj={};
      for(var dk in dObj){
        if(!dObj.hasOwnProperty(dk)) continue;
        var didx=parseInt(dk);
        if(didx===i) continue;
        if(didx>i) newDObj[didx-1]=dObj[dk];
        else newDObj[didx]=dObj[dk];
      }
      window[dateKeys[di]]=newDObj;
    }
    // Fix dateData presenze/pre/post indices
    for(var ddk in dateData){
      if(!dateData.hasOwnProperty(ddk)) continue;
      var dd=dateData[ddk];
      for(var dci=0;dci<3;dci++){
        var dck=['presenze','pre','post'][dci];
        if(!dd[dck]) continue;
        var ndd={};
        for(var ix in dd[dck]){
          if(!dd[dck].hasOwnProperty(ix)) continue;
          var nix=parseInt(ix);
          if(nix===i) continue;
          if(nix>i) ndd[nix-1]=dd[dck][ix];
          else ndd[nix]=dd[dck][ix];
        }
        dd[dck]=ndd;
      }
    }
    selectedChild=-1;showDietModal=-1;
    saveState();render();
  },

        var preDaysStr=preDays[pi].length>0?preDays[pi].join(', '):'-';
        var postDaysStr=postDays[pi].length>0?postDays[pi].join(', '):'-';
        var row=[pi+1,children[pi],ageStr,preStr,preDaysStr,postStr,postDaysStr,hasAny?'SI':'NO'];
        if(hasAny) payBody.push(row);
        else noBody.push(row);
      }

      // Section: BAMBINI CHE DEVONO PAGARE
      if(payBody.length>0){
        doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(180,40,40);
        doc.text('BAMBINI CHE DEVONO PAGARE LA RETTA AGGIUNTIVA ('+payBody.length+')',14,y);
        y+=4;

        doc.autoTable({
          startY:y,
          head:[['#','Bambino','Eta','Pre','Giorni Pre','Post','Giorni Post','Paga']],
          body:payBody,
          theme:'grid',
          headStyles:{fillColor:[230,126,0],textColor:[255,255,255],fontStyle:'bold',fontSize:7,halign:'center'},
          columnStyles:{
            0:{cellWidth:7,halign:'center',fontStyle:'bold'},
            1:{cellWidth:32},
            2:{cellWidth:9,halign:'center'},
            3:{cellWidth:14,halign:'center'},
            4:{cellWidth:28,halign:'center'},
            5:{cellWidth:14,halign:'center'},
            6:{cellWidth:28,halign:'center'},
            7:{cellWidth:14,halign:'center',fontStyle:'bold'}
          },
          bodyStyles:{fontSize:7},
          alternateRowStyles:{fillColor:[255,248,240]},
          didParseCell:function(data){
            if(data.section==='body'){
              if(data.column.index===7){
                var raw=data.cell.raw;
                if(raw==='SI'){data.cell.styles.textColor=[180,40,40];data.cell.styles.fontStyle='bold';data.cell.styles.fillColor=[255,220,220];}
              }
              if(data.column.index===3){
                var numMatch=String(data.cell.raw).match(/^\d+/);
                if(numMatch&&parseInt(numMatch[0])>0){data.cell.styles.textColor=[180,100,0];data.cell.styles.fontStyle='bold';}
                else{data.cell.styles.textColor=[180,180,180];}
              }
              if(data.column.index===5){
                var numMatch2=String(data.cell.raw).match(/^\d+/);
                if(numMatch2&&parseInt(numMatch2[0])>0){data.cell.styles.textColor=[0,80,180];data.cell.styles.fontStyle='bold';}
                else{data.cell.styles.textColor=[180,180,180];}
              }
              if(data.column.index===2){
                var ageRaw=data.cell.raw;
                if(ageRaw&&ageRaw!=='-'){data.cell.styles.textColor=[133,100,4];data.cell.styles.fontStyle='bold';}
              }
              if(data.column.index===4){
                if(data.cell.raw&&data.cell.raw!=='-'){data.cell.styles.textColor=[180,100,0];data.cell.styles.fontSize=6.5;}
              }
              if(data.column.index===6){
                if(data.cell.raw&&data.cell.raw!=='-'){data.cell.styles.textColor=[0,80,180];data.cell.styles.fontSize=6.5;}
              }
            }
          }
        });
        y=doc.lastAutoTable.finalY+8;
      }

      // Check if we need a new page for the second section
      if(y>pageH-40){
        doc.addPage();
        y=20;
      }

      // Section: BAMBINI SENZA PRE/POST
      if(noBody.length>0){
        doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(40,130,40);
        doc.text('BAMBINI SENZA PRE/POST - Non pagano retta aggiuntiva ('+noBody.length+')',14,y);
        y+=4;

        doc.autoTable({
          startY:y,
          head:[['#','Bambino','Eta','Pre','Post','Paga']],
          body:noBody.map(function(r){return [r[0],r[1],r[2],r[3],r[5],r[7]];}),
          theme:'grid',
          headStyles:{fillColor:[40,130,40],textColor:[255,255,255],fontStyle:'bold',fontSize:7,halign:'center'},
          columnStyles:{
            0:{cellWidth:7,halign:'center',fontStyle:'bold'},
            1:{cellWidth:50},
            2:{cellWidth:10,halign:'center'},
            3:{cellWidth:18,halign:'center'},
            4:{cellWidth:18,halign:'center'},
            5:{cellWidth:18,halign:'center',fontStyle:'bold'}
          },
          bodyStyles:{fontSize:7},
          alternateRowStyles:{fillColor:[232,245,233]},
          didParseCell:function(data){
            if(data.section==='body'){
              if(data.column.index===5){
                var raw2=data.cell.raw;
                if(raw2==='NO'){data.cell.styles.textColor=[40,130,40];data.cell.styles.fontStyle='bold';}
              }
              if(data.column.index===2){
                var ageRaw2=data.cell.raw;
                if(ageRaw2&&ageRaw2!=='-'){data.cell.styles.textColor=[133,100,4];data.cell.styles.fontStyle='bold';}
              }
            }
          }
        });
        y=doc.lastAutoTable.finalY+8;
      }
    }

    // Footer
    if(y>pageH-16) y=pageH-16;
    doc.setDrawColor(200,200,200);
    doc.line(14,y,pageW-14,y);
    doc.setFontSize(8);doc.setTextColor(150,150,150);doc.setFont('helvetica','normal');
    doc.text('Generato il '+(new Date().toLocaleDateString('it-IT'))+' - Elenco Pre/Post '+monthLabel,pageW/2,y+6,{align:'center'});

    var fileName='PrePost_'+className.replace(/\s+/g,'_')+'_'+MONTHS[cm]+'_'+cy+'.pdf';
    doc.save(fileName);
  },
  openDietModal:function(idx){showDietModal=idx;render();},
  closeDietModal:function(){showDietModal=-1;render();},
  selectDiet:function(idx,typeId){
    if(!childDiets[idx]) childDiets[idx]={};
    childDiets[idx].type=typeId;
    if(typeId!=='personalizzata') childDiets[idx].note='';
    saveState();render();
    if(typeId==='personalizzata'){var noteInput=document.getElementById('dietNote');if(noteInput)noteInput.focus();}
  },
  updateDietNote:function(idx,note){
    if(!childDiets[idx]) childDiets[idx]={type:'personalizzata'};
    childDiets[idx].note=note;
    if(firestoreSaveTimer) clearTimeout(firestoreSaveTimer);
    syncStatus='saving';renderSyncBar();
    firestoreSaveTimer=setTimeout(function(){saveCurrentClassData();doSaveToFirestore();try{localStorage.setItem(getStorageKey(),JSON.stringify({classes:classes,currentClassId:currentClassId,schoolName:schoolName,currentDate:dateToInput(currentDate)}));}catch(e){}},1500);
  },
  importData:function(){
    var input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=function(e){
      var file=e.target.files[0];if(!file)return;var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var d=JSON.parse(ev.target.result);
          if(d.classes){
            classes=d.classes;currentClassId=d.currentClassId||'';
            if(d.schoolName) schoolName=d.schoolName;
            ensureDefaultClass();
          }else{
            if(d.children)children=d.children;for(var ii=0;ii<children.length;ii++){children[ii]=children[ii].toUpperCase();}
            if(d.dateData)dateData=d.dateData;else if(d.presenze||d.pre||d.post){var key=getCurrentDateKey();dateData[key]={presenze:d.presenze||{},pre:d.pre||{},post:d.post||{}};}
            if(d.childDiets)childDiets=d.childDiets;
            if(d.className)className=d.className;
            if(d.childGender)childGender=d.childGender;
            if(d.childDeleghe)childDeleghe=d.childDeleghe;
            if(d.childContatti)childContatti=d.childContatti;
            if(d.childAge)childAge=d.childAge;
            if(d.childNotes)childNotes=d.childNotes;
            ensureDefaultClass();
          }
          var ckey=getCurrentDateKey();var dd=dateData[ckey];if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}else{presenze={};pre={};post={};}
          saveState();render();alert('Dati importati con successo!');
        }catch(err){alert('File non valido.');}
      };reader.readAsText(file);
    };input.click();
  },
  backupData:function(){
    saveCurrentClassData();
    var data=JSON.stringify({classes:classes,currentClassId:currentClassId,schoolName:schoolName,className:className,dateExport:new Date().toISOString()},null,2);
    var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='registro-presenze-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
  },
  viewMonth:function(){
    saveCurrentDateData();
    var summary='--- RIEPILOGO ---\nClasse: '+className+'\n\n';
    var hasAnyDiet=false;
    for(var di2=0;di2<children.length;di2++){
      if(childDiets[di2]&&childDiets[di2].type&&childDiets[di2].type!=='nessuna'){
        if(!hasAnyDiet){summary+='--- DIETE ---\n';hasAnyDiet=true;}
        summary+=children[di2]+': '+getDietType(childDiets[di2].type).name+(childDiets[di2].note?' ('+childDiets[di2].note+')':'')+'\n';
      }
    }
    if(hasAnyDiet) summary+='\n';
    var datesWithData=[];for(var k in dateData){if(dateData.hasOwnProperty(k)&&(countKeys(dateData[k].presenze)>0||countKeys(dateData[k].pre)>0||countKeys(dateData[k].post)>0)){datesWithData.push(k);}}
    datesWithData.sort();
    if(datesWithData.length===0){summary+='Nessun dato salvato per altre date.\n\n';}
    else{for(var di=0;di<datesWithData.length;di++){var dk=datesWithData[di];var dd2=dateData[dk];summary+='--- '+dk+' ---\n';for(var ci2=0;ci2<children.length;ci2++){if(dd2.presenze[ci2]||dd2.pre[ci2]||dd2.post[ci2]){summary+=children[ci2]+': P='+((dd2.presenze[ci2])?'Si':'No')+' Pre='+((dd2.pre[ci2])?'Si':'No')+' Post='+((dd2.post[ci2])?'Si':'No')+'\n';}}summary+='Totale: '+countKeys(dd2.presenze)+' presenze, '+countKeys(dd2.pre)+' pre, '+countKeys(dd2.post)+' post\n\n';}}
    summary+='--- OGGI ('+dateToFull(currentDate)+') ---\n';
    for(var i=0;i<children.length;i++){summary+=children[i]+': P='+((presenze[i])?'Si':'No')+' Pre='+((pre[i])?'Si':'No')+' Post='+((post[i])?'Si':'No')+'\n';}
    summary+='\nTotale: '+countKeys(presenze)+' presenze, '+countKeys(pre)+' pre, '+countKeys(post)+' post su '+children.length+' bambini';
    alert(summary);
  },
  share:function(){
    if(navigator.share){navigator.share({title:'Registro di Classe - '+className,url:window.location.href}).catch(function(){});}
    else{var ta=document.createElement('textarea');ta.value=window.location.href;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Link copiato negli appunti!');}
  },
  sendMessage:function(classId){
    if(!classId||!classes[classId]) return;
    var input=document.getElementById('msgInput_'+classId);
    if(!input) return;
    var text=input.value.trim();
    if(!text) return;
    if(!classes[classId].messages) classes[classId].messages=[];
    classes[classId].messages.push({text:text,timestamp:Date.now()});
    // Render subito per mostrare il messaggio
    render();
    // Scroll alla sezione messaggi di questa classe
    var msgBox=document.getElementById('msgBox_'+classId);
    if(msgBox){msgBox.scrollIntoView({behavior:'smooth',block:'center'});}
    // Focus sull'input per scrivere un altro messaggio
    var newInput=document.getElementById('msgInput_'+classId);
    if(newInput){newInput.focus();}
    // Salva i dati dopo il render
    saveCurrentClassData();
    try{localStorage.setItem(getStorageKey(),JSON.stringify({classes:JSON.parse(JSON.stringify(classes)),currentClassId:currentClassId,schoolName:schoolName,currentDate:dateToInput(currentDate)}));}catch(e){}
    saveToFirestoreNow();
  },
  deleteMessage:function(classId,msgIdx){
    if(!classId||!classes[classId]) return;
    if(!classes[classId].messages) return;
    if(msgIdx<0||msgIdx>=classes[classId].messages.length) return;
    var msgText=classes[classId].messages[msgIdx].text;
    if(!confirm('Cancellare la comunicazione:\n"'+msgText+'"\n\nVerrà cancellata anche nella classe di riferimento.')) return;
    classes[classId].messages.splice(msgIdx,1);
    // Render subito per aggiornare la lista messaggi
    render();
    // Scroll alla sezione messaggi di questa classe
    var msgBox=document.getElementById('msgBox_'+classId);
    if(msgBox){msgBox.scrollIntoView({behavior:'smooth',block:'center'});}
    // Salva i dati dopo il render
    saveCurrentClassData();
    try{localStorage.setItem(getStorageKey(),JSON.stringify({classes:JSON.parse(JSON.stringify(classes)),currentClassId:currentClassId,schoolName:schoolName,currentDate:dateToInput(currentDate)}));}catch(e){}
    saveToFirestoreNow();
  }
};

initFirebase();
ensureDefaultClass();
render();

})();
</script>
</body>
