var selectedChild = -1;

var dateData = {};

var DAYS = ['Domenica','Luned\u00ec','Marted\u00ec','Mercoled\u00ec','Gioved\u00ec','Venerd\u00ec','Sabato'];
var MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
var MONTHS_SHORT = ['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'];

function dateToKey(dt){
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}
function dateToShort(dt){
  return dt.getDate()+' '+MONTHS_SHORT[dt.getMonth()]+' '+dt.getFullYear();
}
function dateToFull(dt){
  return DAYS[dt.getDay()]+' '+dt.getDate()+' '+MONTHS[dt.getMonth()]+' '+dt.getFullYear();
}
function dateToInput(dt){
  return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');
}

function getInitials(name){
  var parts=name.trim().split(/\s+/);
  if(parts.length>=2) return parts[0][0].toUpperCase()+parts[parts.length-1][0].toUpperCase();
  return parts[0].substring(0,2).toUpperCase();
}
function nameReversed(name){
  var parts=name.trim().split(/\s+/);
  if(parts.length>=2) return parts[parts.length-1]+' '+parts[0];
  return name;
}
function countKeys(obj){var c=0;for(var k in obj)if(obj.hasOwnProperty(k))c++;return c;}
function hasKey(obj,k){return obj.hasOwnProperty(k);}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getDietType(typeId){
  for(var i=0;i<DIET_TYPES.length;i++){
    if(DIET_TYPES[i].id===typeId) return DIET_TYPES[i];
  }
  return DIET_TYPES[0];
}
function getDietLabel(idx){
  if(!childDiets[idx]||childDiets[idx].type==='nessuna') return '';
  return getDietType(childDiets[idx].type).name;
}
function getDietTagClass(typeId){
  if(!typeId||typeId==='nessuna') return 'default';
  return typeId;
}

function guessGender(name){
  var firstName=name.trim().split(/\s+/)[0].toLowerCase();
  var maleNames=['leonardo','tommaso','mattia','nicola','simone','davide','federico','gabriele','alessandro','lorenzo','pietro','marco','edoardo','filippo','luca'];
  var femaleNames=['sofia','aurora','giulia','alice','elisa','beatrice','martina','chiara','ginevra','emma','viola','camilla','anna','bianca','giorgia'];
  for(var i=0;i<maleNames.length;i++){if(firstName===maleNames[i]) return 'm';}
  for(var j=0;j<femaleNames.length;j++){if(firstName===femaleNames[j]) return 'f';}
  if(firstName.endsWith('a')||firstName.endsWith('e')) return 'f';
  if(firstName.endsWith('o')||firstName.endsWith('i')) return 'm';
  return 'm';
}
function getGender(idx){
  if(childGender[idx]) return childGender[idx];
  return guessGender(children[idx]);
}
function getGenderClass(idx){var g=getGender(idx);return g==='f'?'female':'male';}

function getCurrentDateKey(){ return dateToKey(currentDate); }

function saveCurrentDateData(){
  var key=getCurrentDateKey();
  dateData[key]={presenze:JSON.parse(JSON.stringify(presenze)),pre:JSON.parse(JSON.stringify(pre)),post:JSON.parse(JSON.stringify(post))};
}

function switchToDate(dt){
  saveCurrentDateData();
  currentDate=new Date(dt);
  var key=getCurrentDateKey();
  var dd=dateData[key];
  if(dd){presenze=JSON.parse(JSON.stringify(dd.presenze||{}));pre=JSON.parse(JSON.stringify(dd.pre||{}));post=JSON.parse(JSON.stringify(dd.post||{}));}
  else{presenze={};pre={};post={};}
}

function getStorageKey(){
  if(currentUser) return 'rp_data_'+currentUser.uid;
  return 'rp_data';
}

function resetAllData(){
  children=['Sofia Rossi','Leonardo Bianchi','Aurora Romano','Tommaso Ferrari','Giulia Esposito','Mattia Ricci','Alice Marino','Nicola Parisi','Elisa Benedetti','Simone Rinaldi','Beatrice Costa','Davide Moretti','Martina Barbieri','Federico Rizzo','Chiara Lombardi','Gabriele Gallo','Ginevra Conti','Alessandro De Luca','Lorenzo Greco','Emma Bruno','Pietro Colombo','Viola Fontana','Marco Villa','Camilla Russo','Edoardo Messina','Anna Serra','Filippo Mazza','Bianca Pellegrini','Luca Marchetti','Giorgia Ferretti'];
  dateData={};presenze={};pre={};post={};childDiets={};childGender={};childDeleghe={};childContatti={};childAge={};
  className='Coccinelle';
  currentDate=new Date();
  search='';selectedChild=-1;showDietModal=-1;
}

function saveState(){
  saveCurrentDateData();
  try{localStorage.setItem(getStorageKey(),JSON.stringify({children:children,dateData:dateData,childDiets:childDiets,childGender:childGender,childDeleghe:childDeleghe,childContatti:childContatti,childLastModified:childLastModified,childAge:childAge,sortMode:sortMode,currentDate:dateToInput(currentDate),className:className}));}catch(e){}
  saveToFirestore();
}

function loadState(){
  try{
    var d=JSON.parse(localStorage.getItem(getStorageKey()));
    if(d){
      if(d.children) children=d.children;
      if(d.dateData) dateData=d.dateData;
      if(d.childDiets) childDiets=d.childDiets;
      if(d.childGender) childGender=d.childGender;
      if(d.childDeleghe) childDeleghe=d.childDeleghe;
      if(d.childContatti) childContatti=d.childContatti;
      if(d.childLastModified) childLastModified=d.childLastModified;
      if(d.childAge) childAge=d.childAge;
      if(d.sortMode) sortMode=d.sortMode;
      if(!d.dateData&&(d.presenze||d.pre||d.post)){
        var key=d.currentDate||dateToKey(new Date());
        dateData[key]={presenze:d.presenze||{},pre:d.pre||{},post:d.post||{}};
      }
      if(d.currentDate){ try{currentDate=new Date(d.currentDate+'T12:00:00');}catch(e){currentDate=new Date();} }
      else if(typeof d.dateIndex==='number'){ /* legacy: ignore old dateIndex */ }
      if(d.className) className=d.className;
    }
  }catch(e){}
  var key=getCurrentDateKey();
  var dd=dateData[key];
  if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}
}

var firestoreSaveTimer=null;
function saveToFirestore(){
  if(!currentUser||!db) return;
  if(firestoreSaveTimer) clearTimeout(firestoreSaveTimer);
  syncStatus='saving';renderSyncBar();
  firestoreSaveTimer=setTimeout(function(){doSaveToFirestore();},1000);
}
function doSaveToFirestore(){
  if(!currentUser||!db) return;
  var data={children:children,className:className,dateData:dateData,childDiets:childDiets,childGender:childGender,childDeleghe:childDeleghe,childContatti:childContatti,childLastModified:childLastModified,childAge:childAge,sortMode:sortMode,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
  db.collection('users').doc(currentUser.uid).set(data,{merge:true})
    .then(function(){syncStatus='synced';renderSyncBar();setTimeout(function(){if(syncStatus==='synced'){syncStatus='idle';renderSyncBar();}},3000);})
    .catch(function(err){console.error('Firestore save error:',err);syncStatus='error';renderSyncBar();});
}
function loadFromFirestore(uid){
  if(!db) return;
  resetAllData();
  syncStatus='saving';renderSyncBar();
  db.collection('users').doc(uid).get()
    .then(function(doc){
      if(doc.exists){
        var d=doc.data();
        if(d.children&&d.children.length>0) children=d.children;
        if(d.className) className=d.className;
        if(d.dateData) dateData=d.dateData;
        if(d.childDiets) childDiets=d.childDiets;
        if(d.childGender) childGender=d.childGender;
        if(d.childDeleghe) childDeleghe=d.childDeleghe;
        if(d.childContatti) childContatti=d.childContatti;
        if(d.childLastModified) childLastModified=d.childLastModified;
        if(d.childAge) childAge=d.childAge;
        if(d.sortMode) sortMode=d.sortMode;
        var key=getCurrentDateKey();var dd=dateData[key];
        if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}
        else{presenze={};pre={};post={};}
        try{localStorage.setItem(getStorageKey(),JSON.stringify({children:children,dateData:dateData,childDiets:childDiets,childGender:childGender,childDeleghe:childDeleghe,childContatti:childContatti,childLastModified:childLastModified,childAge:childAge,sortMode:sortMode,currentDate:dateToInput(currentDate),className:className}));}catch(e){}
      }else{
        try{localStorage.removeItem(getStorageKey());}catch(e){}
      }
      firestoreLoaded=true;syncStatus='synced';render();
      setTimeout(function(){if(syncStatus==='synced'){syncStatus='idle';renderSyncBar();}},3000);
    })
    .catch(function(err){console.error('Firestore load error:',err);firestoreLoaded=true;syncStatus='error';render();});
}
function renderSyncBar(){
  var bar=document.getElementById('sync-bar');
  if(!bar) return;
  if(!currentUser){bar.style.display='none';return;}
  bar.style.display='flex';bar.className='sync-bar';
  if(syncStatus==='saving'){bar.classList.add('saving');bar.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M7.76 7.76L4.93 4.93"/></svg> Salvataggio in corso...';}
  else if(syncStatus==='synced'){bar.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9 12l2 2 4-4"/></svg> Dati sincronizzati';}
  else if(syncStatus==='error'){bar.classList.add('error');bar.innerHTML='<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Errore di sincronizzazione';}
  else{bar.style.display='none';}
}

function initFirebase(){
  try{
    if(typeof firebase==='undefined'){console.warn('Firebase SDK not loaded');render();return;}
    firebase.initializeApp(FIREBASE_CONFIG);
    var auth=firebase.auth();
    db=firebase.firestore();
    try{db.enablePersistence({synchronizeTabs:true});}catch(e){console.log('Firestore persistence:',e.message||e);}
    try{auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);}catch(e){try{auth.setPersistence(firebase.auth.Auth.Persistence.SESSION);}catch(e2){try{auth.setPersistence(firebase.auth.Auth.Persistence.NONE);}catch(e3){}}}
    auth.onAuthStateChanged(function(u){
      var previousUser=currentUser;
      currentUser=u;loginLoading=false;
      if(u){
        if(previousUser&&previousUser.uid!==u.uid){
          resetAllData();
        }
        loadFromFirestore(u.uid);
      }else{
        try{localStorage.removeItem('rp_data');}catch(e){}
        try{if(previousUser){localStorage.removeItem('rp_data_'+previousUser.uid);}}catch(e2){}
        resetAllData();
        loadState();
        syncStatus='idle';render();
      }
    });
    try{auth.getRedirectResult();}catch(e){}
  }catch(e){console.error('Firebase init error:',e);render();}
}

function handleLogin(){
  if(typeof firebase==='undefined'){alert('Firebase non caricato. Ricarica la pagina.');return;}
  var auth=firebase.auth();
  if(currentUser){
    if(confirm('Vuoi disconnettere l\'account "'+(currentUser.displayName||currentUser.email)+'"?\n\nI dati rimarranno salvati nel tuo account Google.')){saveCurrentDateData();doSaveToFirestore();auth.signOut().then(function(){try{localStorage.removeItem(getStorageKey());}catch(e){}resetAllData();render();});}
  }else{
    loginLoading=true;render();
    var provider=new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(function(error){
      loginLoading=false;render();var msg='Errore durante il login.';
      if(error.code==='auth/popup-closed-by-user') return;
      else if(error.code==='auth/popup-blocked'){auth.signInWithRedirect(provider);return;}
      else if(error.code==='auth/unauthorized-domain'){msg='Dominio "'+window.location.hostname+'" non autorizzato.\n\nVai su Firebase Console > Authentication > Settings > Authorized domains e aggiungi:\n'+window.location.hostname;}
      else if(error.code==='auth/operation-not-allowed'){msg='Login Google non abilitato. Abilitalo in Firebase Console.';}
      else{msg='Errore: '+error.message;}
      alert(msg);
    });
  }
}

function getFilteredChildren(){
  var result=[];for(var i=0;i<children.length;i++){if(!search||children[i].toLowerCase().indexOf(search.toLowerCase())>=0){result.push({name:children[i],i:i});}}
  if(sortMode==='alpha'){
    result.sort(function(a,b){return nameReversed(a.name).toLowerCase().localeCompare(nameReversed(b.name).toLowerCase());});
  }else if(sortMode==='gender'){
    result.sort(function(a,b){var ga=getGender(a.i),gb=getGender(b.i);if(ga!==gb) return ga==='f'?-1:1;return nameReversed(a.name).toLowerCase().localeCompare(nameReversed(b.name).toLowerCase());});
  }else if(sortMode==='recent'){
    result.sort(function(a,b){var ta=childLastModified[a.i]||0,tb=childLastModified[b.i]||0;return tb-ta;});
  }else if(sortMode==='age-asc'){
    result.sort(function(a,b){var aa=parseFloat(childAge[a.i])||0,bb=parseFloat(childAge[b.i])||0;return aa-bb;});
  }else if(sortMode==='age-desc'){
    result.sort(function(a,b){var aa=parseFloat(childAge[a.i])||0,bb=parseFloat(childAge[b.i])||0;return bb-aa;});
  }
  return result;
}

function getChildMonthlyStats(idx){
  saveCurrentDateData();
  var cm=currentDate.getMonth();
  var cy=currentDate.getFullYear();
  var daysInMonth=new Date(cy,cm+1,0).getDate();
  var currentDay=currentDate.getDate();
  var mP=0,mPre=0,mPost=0;
  var dayList=[];
  for(var d=1;d<=Math.min(daysInMonth,currentDay);d++){
    var dKey=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dd=dateData[dKey];
    var pFlag=false,preFlag=false,postFlag=false;
    if(dd){
      if(dd.presenze&&dd.presenze[idx]) pFlag=true;
      if(dd.pre&&dd.pre[idx]) preFlag=true;
      if(dd.post&&dd.post[idx]) postFlag=true;
    }
    if(pFlag) mP++;
    if(preFlag) mPre++;
    if(postFlag) mPost++;
    if(pFlag||preFlag||postFlag){
      dayList.push({day:d,key:dKey,p:pFlag,pre:preFlag,post:postFlag});
    }
  }
  return {presenze:mP,pre:mPre,post:mPost,days:dayList,totalDays:Math.min(daysInMonth,currentDay)};
}

      var delegheStr=delegheList.length>0?delegheList.join(', '):'-';
      var contattiList=childContatti[pi]||[];
      var contattiStr=contattiList.length>0?contattiList.map(function(c){return c.nome+': '+c.telefono;}).join(', '):'-';
      var ageStr=childAge[pi]||'-';
      tableBody.push([pi+1,children[pi],ageStr,String(mPresenze[pi]),String(mPre[pi]),String(mPost[pi]),dietInfo||'-',delegheStr,contattiStr]);
    }

    doc.autoTable({
      startY:y,
      head:[['#','Bambino','Età','Presenze','Pre','Post','Dieta','Deleghe','Contatti']],
      body:tableBody,
      theme:'grid',
      headStyles:{fillColor:[26,26,46],textColor:[255,255,255],fontStyle:'bold',fontSize:6,halign:'center'},
      columnStyles:{
        0:{cellWidth:6,halign:'center',fontStyle:'bold'},
        1:{cellWidth:34},
        2:{cellWidth:10,halign:'center'},
        3:{cellWidth:15,halign:'center'},
        4:{cellWidth:12,halign:'center'},
        5:{cellWidth:12,halign:'center'},
        6:{cellWidth:28},
        7:{cellWidth:28},
        8:{cellWidth:30}
      },
      bodyStyles:{fontSize:6},
      alternateRowStyles:{fillColor:[245,245,250]},
      didParseCell:function(data){
        if(data.section==='body'){
          var numVal=parseInt(data.cell.raw);
          if(data.column.index===3){
            if(numVal>0){data.cell.styles.textColor=[40,167,69];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[180,180,180];}
          }
          if(data.column.index===4){
            if(numVal>0){data.cell.styles.textColor=[230,126,0];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[180,180,180];}
          }
          if(data.column.index===5){
            if(numVal>0){data.cell.styles.textColor=[0,123,255];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[180,180,180];}
          }
          if(data.column.index===2){
            var ageRaw=data.cell.raw;
            if(ageRaw&&ageRaw!=='-'){data.cell.styles.textColor=[133,100,4];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[180,180,180];}
          }
          if(data.column.index===7){
            var raw=data.cell.raw;
            if(raw&&raw!=='-'){data.cell.styles.textColor=[120,60,150];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[180,180,180];}
          }
          if(data.column.index===8){
            var raw2=data.cell.raw;
            if(raw2&&raw2!=='-'){data.cell.styles.textColor=[0,64,133];data.cell.styles.fontStyle='bold';}
            else{data.cell.styles.textColor=[180,180,180];}
          }
        }
      }
    });

    // Footer
    var finalY=doc.lastAutoTable.finalY+10;
    if(finalY>pageH-20) finalY=pageH-20;
    doc.setDrawColor(200,200,200);
    doc.line(14,finalY,pageW-14,finalY);
    doc.setFontSize(8);
    doc.setTextColor(150,150,150);
    doc.setFont('helvetica','normal');
    doc.text('Generato il '+(new Date().toLocaleDateString('it-IT'))+' - Riepilogo mensile '+monthLabel,pageW/2,finalY+6,{align:'center'});

    // Save
    var fileName='Riepilogo_'+className.replace(/\s+/g,'_')+'_'+MONTHS[cm]+'_'+cy+'.pdf';
    doc.save(fileName);
  },
  openDietModal:function(idx){showDietModal=idx;render();},
  closeDietModal:function(){showDietModal=-1;render();},
  selectDiet:function(idx,typeId){
    if(!childDiets[idx]) childDiets[idx]={};
    childDiets[idx].type=typeId;
    if(typeId!=='personalizzata') childDiets[idx].note='';
    saveState();render();
    if(typeId==='personalizzata'){var noteInput=document.getElementById('dietNote');if(noteInput)noteInput.focus();}
  },
  updateDietNote:function(idx,note){
    if(!childDiets[idx]) childDiets[idx]={type:'personalizzata'};
    childDiets[idx].note=note;
    if(firestoreSaveTimer) clearTimeout(firestoreSaveTimer);
    syncStatus='saving';renderSyncBar();
    firestoreSaveTimer=setTimeout(function(){doSaveToFirestore();try{localStorage.setItem(getStorageKey(),JSON.stringify({children:children,dateData:dateData,childDiets:childDiets,childGender:childGender,childDeleghe:childDeleghe,childContatti:childContatti,childLastModified:childLastModified,childAge:childAge,sortMode:sortMode,currentDate:dateToInput(currentDate),className:className}));}catch(e){}},1500);
  },
  importData:function(){
    var input=document.createElement('input');input.type='file';input.accept='.json';
    input.onchange=function(e){
      var file=e.target.files[0];if(!file)return;var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var d=JSON.parse(ev.target.result);
          if(d.children)children=d.children;
          if(d.dateData)dateData=d.dateData;else if(d.presenze||d.pre||d.post){var key=getCurrentDateKey();dateData[key]={presenze:d.presenze||{},pre:d.pre||{},post:d.post||{}};}
          if(d.childDiets)childDiets=d.childDiets;
          if(d.className)className=d.className;
          var ckey=getCurrentDateKey();var dd=dateData[ckey];if(dd){presenze=dd.presenze||{};pre=dd.pre||{};post=dd.post||{};}else{presenze={};pre={};post={};}
          saveState();render();alert('Dati importati con successo!');
        }catch(err){alert('File non valido.');}
      };reader.readAsText(file);
    };input.click();
  },
  backupData:function(){
    saveCurrentDateData();
    var data=JSON.stringify({children:children,dateData:dateData,childDiets:childDiets,className:className,dateExport:new Date().toISOString()},null,2);
    var blob=new Blob([data],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='registro-presenze-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
  },
  viewMonth:function(){
    saveCurrentDateData();
    var summary='--- RIEPILOGO ---\nClasse: '+className+'\n\n';
    var hasAnyDiet=false;
    for(var di2=0;di2<children.length;di2++){
      if(childDiets[di2]&&childDiets[di2].type&&childDiets[di2].type!=='nessuna'){
        if(!hasAnyDiet){summary+='--- DIETE ---\n';hasAnyDiet=true;}
        summary+=children[di2]+': '+getDietType(childDiets[di2].type).name+(childDiets[di2].note?' ('+childDiets[di2].note+')':'')+'\n';
      }
    }
    if(hasAnyDiet) summary+='\n';
    var datesWithData=[];for(var k in dateData){if(dateData.hasOwnProperty(k)&&(countKeys(dateData[k].presenze)>0||countKeys(dateData[k].pre)>0||countKeys(dateData[k].post)>0)){datesWithData.push(k);}}
    datesWithData.sort();
    if(datesWithData.length===0){summary+='Nessun dato salvato per altre date.\n\n';}
    else{for(var di=0;di<datesWithData.length;di++){var dk=datesWithData[di];var dd2=dateData[dk];summary+='--- '+dk+' ---\n';for(var ci2=0;ci2<children.length;ci2++){if(dd2.presenze[ci2]||dd2.pre[ci2]||dd2.post[ci2]){summary+=children[ci2]+': P='+((dd2.presenze[ci2])?'Si':'No')+' Pre='+((dd2.pre[ci2])?'Si':'No')+' Post='+((dd2.post[ci2])?'Si':'No')+'\n';}}summary+='Totale: '+countKeys(dd2.presenze)+' presenze, '+countKeys(dd2.pre)+' pre, '+countKeys(dd2.post)+' post\n\n';}}
    summary+='--- OGGI ('+dateToFull(currentDate)+') ---\n';
    for(var i=0;i<children.length;i++){summary+=children[i]+': P='+((presenze[i])?'Si':'No')+' Pre='+((pre[i])?'Si':'No')+' Post='+((post[i])?'Si':'No')+'\n';}
    summary+='\nTotale: '+countKeys(presenze)+' presenze, '+countKeys(pre)+' pre, '+countKeys(post)+' post su '+children.length+' bambini';
    alert(summary);
  },
  share:function(){
    if(navigator.share){navigator.share({title:'Registro Presenze - '+className,url:window.location.href}).catch(function(){});}
    else{var ta=document.createElement('textarea');ta.value=window.location.href;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);alert('Link copiato negli appunti!');}
  }
};

loadState();
initFirebase();
render();

})();
</script>
</body>
</html>
