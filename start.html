<!DOCTYPE html>
<html><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<title>Registro di Classe</title>
<style>body{margin:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:white;flex-direction:column;gap:16px}.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.2);border-top:4px solid #ffd700;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}</style>
</head><body>
<div class="spinner"></div>
<p>Caricamento app v15d...</p>
<script>
// Fetch the real app from a non-cached source and inject it
var APP_URL='https://raw.githubusercontent.com/lorenzoseppone-collabzeppo/registro-presenze/main/go.html';
fetch(APP_URL,{cache:'no-store'})
.then(function(r){return r.text();})
.then(function(html){
  document.open();
  document.write(html);
  document.close();
})
.catch(function(e){
  document.body.innerHTML='<p style="color:red">Errore caricamento: '+e.message+'</p><p>Ricarica la pagina</p>';
});
</script>
</body></html>
